<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeReboot | Login</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body class="landing-page">
<main class="hero-shell shell">
    <section class="hero-copy">
        <p class="eyebrow">CodeReboot Arena</p>
        <h2>Software Architecture Project</h2>
        <p class="hero-lead">
            Enter a room, face a rival, and trade pulses across a grid.<br>
            By - <br>
            <span class="author-name-glow">Nishant Pradhan</span><br>
            <span class="author-name-glow">2023A7PS0030P</span>
        </p>
        <div class="hero-points">
            <span>Room multiplayer</span>
            <span>1v1 battles</span>
        </div>
    </section>

    <section class="card stack-card">
        <div class="card-heading">
            <p class="eyebrow">Secure Access</p>
            <h2>Join the arena</h2>
        </div>

        <div class="auth-tabs">
            <button class="auth-tab active" type="button" data-tab="login">Login</button>
            <button class="auth-tab" type="button" data-tab="register">Register</button>
        </div>

        <form id="login-form" class="auth-form form-stack active">
            <label class="field">
                <span>Username</span>
                <input id="login-username" name="username" maxlength="20" placeholder="nova_strike" autocomplete="username" required>
            </label>
            <label class="field">
                <span>Password</span>
                <input id="login-password" name="password" type="password" placeholder="********" autocomplete="current-password" required>
            </label>
            <button class="primary-button" type="submit">Login</button>
            <p class="form-message" id="login-message"></p>
        </form>

        <form id="register-form" class="auth-form form-stack">
            <label class="field">
                <span>Username</span>
                <input id="register-username" name="username" maxlength="20" placeholder="nova_strike" autocomplete="username" required>
            </label>
            <label class="field">
                <span>Email</span>
                <input id="register-email" name="email" type="email" placeholder="you@example.com" autocomplete="email" required>
            </label>
            <label class="field">
                <span>Password</span>
                <input id="register-password" name="password" type="password" placeholder="********" autocomplete="new-password" required>
            </label>
            <p class="fine-print">Password must be at least 8 characters. Username: 3-20 alphanumeric + underscore only.</p>
            <button class="primary-button" type="submit">Create account</button>
            <p class="form-message" id="register-message"></p>
        </form>
    </section>
</main>

<script type="module" src="/js/auth.js"></script>
</body>
</html>
