server.address=${SERVER_ADDRESS:0.0.0.0}
server.port=${SERVER_PORT:8080}
server.forward-headers-strategy=framework
logging.pattern.console=${LOGGING_PATTERN_CONSOLE:%d{HH:mm:ss.SSS} %-5level [%thread] [%X{requestId:-}] %logger{36} - %msg%n}

# JWT authentication settings
# For production, set APP_JWT_SECRET as a strong 32+ byte value.
app.auth.jwt-secret=${APP_JWT_SECRET:}
app.auth.token-ttl-minutes=${APP_AUTH_TOKEN_TTL_MINUTES:120}

# Optional comma-separated list of allowed WebSocket origins.
# Leave blank for same-origin only.
app.websocket.allowed-origins=

# PostgreSQL Database Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/codereboot}
spring.datasource.username=${DB_USERNAME:codereboot_user}
spring.datasource.password=${DB_PASSWORD:codereboot_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=10
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Observability and metrics
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true
management.metrics.tags.application=codereboot